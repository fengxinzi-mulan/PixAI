name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag, for example v1.0.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  validate:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-15]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Build app
        run: pnpm build

  package:
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
            arch: x64
            artifact: pixai-windows-x64
            package_command: pnpm exec electron-builder --win nsis --x64 --publish never
            artifact_path: |
              dist/*-x64.exe
              dist/*-x64.exe.blockmap
          - platform: windows
            os: windows-latest
            arch: ia32
            artifact: pixai-windows-ia32
            package_command: pnpm exec electron-builder --win nsis --ia32 --publish never
            artifact_path: |
              dist/*-ia32.exe
              dist/*-ia32.exe.blockmap
          - platform: mac
            os: macos-15-intel
            arch: x64
            artifact: pixai-mac-x64
            package_command: pnpm exec electron-builder --mac dmg zip --x64 --publish never
            artifact_path: |
              dist/*mac-x64.dmg
              dist/*mac-x64.zip
          - platform: mac
            os: macos-15
            arch: arm64
            artifact: pixai-mac-arm64
            package_command: pnpm exec electron-builder --mac dmg zip --arm64 --publish never
            artifact_path: |
              dist/*mac-arm64.dmg
              dist/*mac-arm64.zip
    runs-on: ${{ matrix.os }}
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build app
        run: pnpm build

      - name: Package ${{ matrix.platform }} ${{ matrix.arch }}
        run: ${{ matrix.package_command }}

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  release:
    needs: package
    runs-on: windows-latest
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: release-assets/*
